let _editTabLineaId = null, _editTabId = null;

function openEditTabella(lineaId, tabId) {
  // Cerca la linea in TUTTI i servizi
  let linea = null;
  for (const sId of ['LUN-VEN','SAB','DOM']) {
    linea = getLineeServizio(sId).find(l => l.id === lineaId);
    if (linea) break;
  }
  if (!linea) linea = getLineeServizio(currentServizio).find(l => l.id === lineaId);
  if (!linea) return;
  const tab = (linea.tabelle || []).find(t => t.id === tabId);
  if (!tab) return;
  _editTabLineaId = lineaId;
  _editTabId = tabId;
  document.getElementById('et-cod').value = tab.cod || '';
  document.getElementById('et-usc').value = tab.uscita || getUscita(tab.orario || '06:00');
  document.getElementById('et-out').value = tab.orario || '';
  document.getElementById('et-ret').value = tab.orarioRientro || '';
  // Popola tipologie da DepoTrack
  const tipiDepo = getTipiOptions();
  const sel = document.getElementById('et-tip');
  sel.innerHTML = '<option value="">— Nessuna —</option>' +
    tipiDepo.map(t => `<option value="${t.code}" ${tab.tipologia === t.code ? 'selected' : ''}>${t.code}</option>`).join('');
  document.getElementById('modalEditTab').classList.add('open');
}

function closeEditTab() {
  document.getElementById('modalEditTab').classList.remove('open');
  _editTabLineaId = null; _editTabId = null;
}

function saveEditTabella() {
  if (!_editTabLineaId || !_editTabId) return;
  const cod = document.getElementById('et-cod').value.trim();
  const uscita = document.getElementById('et-usc').value || '1';
  const orario = document.getElementById('et-out').value;
  const orarioRientro = document.getElementById('et-ret').value;
  const tipologia = document.getElementById('et-tip').value;
  if (!cod) { toast('Codice tabella obbligatorio', true); return; }

  if (!usciteData.linee) usciteData.linee = {};
  const servizi = getServizi();
  const lineaOrig = getLineeServizio(currentServizio).find(l => l.id === _editTabLineaId);
  if (!lineaOrig) { toast('Linea non trovata', true); return; }
  if (!servizi[currentServizio].linee) servizi[currentServizio].linee = {};
  if (!servizi[currentServizio].linee[_editTabLineaId]) {
    servizi[currentServizio].linee[_editTabLineaId] = JSON.parse(JSON.stringify(lineaOrig));
  }
  const tabs = servizi[currentServizio].linee[_editTabLineaId].tabelle || [];
  const idx = tabs.findIndex(t => t.id === _editTabId);
  if (idx !== -1) {
    tabs[idx] = { ...tabs[idx], cod, uscita, orario: orario||'', orarioRientro, tipologia };
  }
  servizi[currentServizio].linee[_editTabLineaId].tabelle = tabs;
  usciteData.servizi = servizi;
  saveUscite();
  closeEditTab();
  toast('Tabella aggiornata');
  render();
}

function renderParcoDrawer() {
  const list = document.getElementById('parcoDrawerList');
  const count = document.getElementById('parcoDrawerCount');
  if (!list) return;
  // Popola tipi se non ancora fatto o vuoto
  const dSel = document.getElementById('parcoDrawerTipoFilter');
  if (dSel && dSel.options.length <= 1) {
    getTipiOptions().forEach(t => {
      const o = document.createElement('option'); o.value=t.code; o.textContent=t.code; dSel.appendChild(o);
    });
  }
  const q = (document.getElementById('parcoDrawerSearch')?.value || '').trim().toLowerCase();
  const tipoF = document.getElementById('parcoDrawerTipoFilter')?.value || '';
  const dayData = getDayData(currentDate);
  const usedToday = new Set();
  for (const k of ['uscita1','uscita2','uscita3']) {
    for (const asgn of Object.values(dayData[k] || {})) {
      if (asgn.vettura) usedToday.add(String(asgn.vettura));
    }
  }
  const rientriOggi = getDayData(currentDate).rientri || {};
  const rientriDomani = getDayData(tomorrowStr()).rientri || {};
  const todayRientri = { ...rientriOggi, ...rientriDomani };
  // rientroPerVet
  const uscitePrec = [];
  if (currentView === 'u2') uscitePrec.push('uscita1');
  if (currentView === 'u3') uscitePrec.push('uscita1','uscita2');
  const rientroPerVet = {};
  for (const k of uscitePrec) {
    for (const [tabId, asgn] of Object.entries(dayData[k] || {})) {
      if (!asgn.vettura) continue;
      for (const linea of getLinee()) {
        const tab = (linea.tabelle||[]).find(t => t.id === tabId);
        if (tab && tab.orarioRientro) { rientroPerVet[String(asgn.vettura)] = tab.orarioRientro; break; }
      }
    }
  }
  let vetture = getVetture().filter(v => !isFermaVettura(v));
  if (parcoDrawerFilter === 'disp') vetture = vetture.filter(v => !usedToday.has(String(v.id)) && !todayRientri[v.id]);
  else if (parcoDrawerFilter === 'inservizio') { const s=new Set(Object.keys(rientroPerVet)); vetture=vetture.filter(v=>s.has(String(v.id))); }
  else if (parcoDrawerFilter === 'rientro') vetture = vetture.filter(v => !!todayRientri[v.id]);
  else if (parcoDrawerFilter === 'ferme') vetture = getVetture().filter(v => isFermaVettura(v));
  if (q) vetture = vetture.filter(v => String(v.targa||v.id).toLowerCase().includes(q));
  if (tipoF) vetture = vetture.filter(v => (getTipoCodice(v)||'').toUpperCase() === tipoF.toUpperCase());
  vetture.sort((a,b) => String(a.targa||a.id).localeCompare(String(b.targa||b.id),undefined,{numeric:true}));
  if (count) count.textContent = vetture.length + ' vet.';
  list.innerHTML = vetture.map(v => {
    const vid = String(v.id);
    const isRientro = !!todayRientri[v.id];
    const oraR = rientroPerVet[vid] || '';
    const tipV = getTipoCodice(v);
    const isFerma = isFermaVettura(v);
    const dotColor = isFerma ? 'var(--red)' : isRientro ? '#3b82f6' : oraR ? 'var(--yellow)' : 'var(--green)';
    const dvid = String(v.id);
    const dSel = _selectedVetId === dvid;
    return `<div data-vid="${dvid}"
      onclick="selectVetParco('${dvid}');if(_selectedVetId===null)toggleParcoDrawer()"
      style="background:${dSel?'#2a2000':'var(--bg2)'};
        border:1px solid ${dSel?'var(--yellow)':'var(--border)'};
        border-radius:6px;padding:6px 8px;display:flex;flex-direction:column;gap:2px;cursor:pointer">
      <div style="display:flex;align-items:center;gap:4px">
        <span style="width:7px;height:7px;border-radius:50%;background:${dotColor};flex-shrink:0"></span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;
          color:${dSel?'var(--yellow)':dotColor}">${v.targa||v.id}</span>
        ${tipV ? `<span style="font-size:10px;color:#c8a800;background:#2a2000;padding:1px 4px;border-radius:8px">[${tipV}]</span>` : ''}
      </div>
      ${oraR ? `<div style="font-size:10px;color:var(--yellow);padding-left:11px">&#8617; ${oraR}</div>` : ''}
    </div>`;
  }).join('');
}
</script>
</body>
</html>
