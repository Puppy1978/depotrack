<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USCITETRACK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg:       #07080d;
  --bg2:      #0d0f1a;
  --bg3:      #13162100;
  --panel:    #111420;
  --border:   #1e2235;
  --border2:  #2a2f4a;
  --text:     #c8cee8;
  --muted:    #555f80;
  --bright:   #e8ecff;

  --u1:       #2563eb;
  --u1l:      #3b82f6;
  --u1dim:    #1e3a5f;
  --u2:       #d97706;
  --u2l:      #f59e0b;
  --u2dim:    #5c3a0a;
  --u3:       #7c3aed;
  --u3l:      #a855f7;
  --u3dim:    #3b1f6e;

  --green:    #10b981;
  --red:      #ef4444;
  --orange:   #f97316;
  --yellow:   #eab308;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ───────── LOGIN ───────── */
#loginScreen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: radial-gradient(ellipse at 30% 50%, #1a1f40 0%, var(--bg) 60%);
}
.login-box {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 48px 40px;
  width: 360px;
  box-shadow: 0 24px 64px rgba(0,0,0,.6);
}
.login-logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 32px; font-weight: 800;
  letter-spacing: 4px; color: var(--bright);
  text-align: center; margin-bottom: 6px;
}
.login-logo span { color: var(--u1l); }
.login-sub {
  text-align: center; color: var(--muted);
  font-size: 12px; letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 36px;
}
.login-box label {
  display: block; font-size: 11px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 6px;
}
.login-box input {
  width: 100%; padding: 11px 14px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 7px; color: var(--bright); font-size: 15px;
  font-family: 'Barlow', sans-serif;
  outline: none; transition: border .2s;
  margin-bottom: 18px;
}
.login-box input:focus { border-color: var(--u1l); }
.btn-login {
  width: 100%; padding: 13px;
  background: var(--u1); border: none;
  border-radius: 7px; color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer;
  transition: background .2s;
}
.btn-login:hover { background: var(--u1l); }
.login-err {
  color: var(--red); font-size: 13px; text-align: center;
  margin-top: 12px; min-height: 20px;
}

/* ───────── APP SHELL ───────── */
#app { display: none; height: 100vh; flex-direction: column; }
#app.visible { display: flex; }

/* ── HEADER ── */
.header {
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px; height: 52px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 800;
  letter-spacing: 3px; color: var(--bright);
  flex-shrink: 0;
}
.logo span { color: var(--u1l); }
.header-sep { flex: 1; }
.date-nav {
  display: flex; align-items: center; gap: 8px;
}
.date-nav button {
  background: var(--bg2); border: 1px solid var(--border2);
  color: var(--text); padding: 5px 10px; border-radius: 5px;
  cursor: pointer; font-size: 18px; transition: background .15s;
}
.date-nav button:hover { background: var(--border2); }
#currentDate {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 600; letter-spacing: 1px;
  color: var(--bright); min-width: 160px; text-align: center;
  cursor: pointer; padding: 4px 10px;
  border-radius: 5px; border: 1px solid transparent;
  transition: border .15s;
}
#currentDate:hover { border-color: var(--border2); }
#dateInput {
  display: none; background: var(--bg2);
  border: 1px solid var(--u1l); color: var(--bright);
  padding: 4px 10px; border-radius: 5px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 15px;
}
.sync-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
  box-shadow: 0 0 6px var(--green);
  transition: background .3s, box-shadow .3s;
}
.sync-dot.syncing { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: pulse 1s infinite; }
.sync-dot.err { background: var(--red); box-shadow: 0 0 6px var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.user-badge {
  background: var(--bg2); border: 1px solid var(--border2);
  padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600; letter-spacing: 1px;
  color: var(--muted); text-transform: uppercase;
}
.btn-logout {
  background: none; border: 1px solid var(--border2);
  color: var(--muted); padding: 5px 12px; border-radius: 5px;
  cursor: pointer; font-size: 12px; transition: all .15s;
  font-family: 'Barlow', sans-serif;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* ── BODY ── */
.body-wrap {
  display: flex; flex: 1; overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 200px; flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.sidebar-section { padding: 16px 12px 8px; }
.sidebar-label {
  font-size: 10px; letter-spacing: 2px; font-weight: 700;
  text-transform: uppercase; color: var(--muted);
  padding: 0 4px; margin-bottom: 8px;
}
.nav-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 9px 12px;
  background: none; border: none;
  border-radius: 7px; cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted);
  transition: all .15s; text-align: left;
}
.nav-btn:hover { background: var(--bg2); color: var(--text); }
.nav-btn.active { color: var(--bright); }
.nav-btn .nav-icon { font-size: 16px; flex-shrink: 0; }

.nav-btn[data-view="u1"].active { background: var(--u1dim); color: var(--u1l); }
.nav-btn[data-view="u2"].active { background: var(--u2dim); color: var(--u2l); }
.nav-btn[data-view="u3"].active { background: var(--u3dim); color: var(--u3l); }
.nav-btn[data-view="vetture"].active { background: #0d2a1a; color: var(--green); }
.nav-btn[data-view="rientri"].active { background: #2a1500; color: var(--orange); }
.nav-btn[data-view="linee"].active { background: #1a1400; color: var(--yellow); }

.nav-badge {
  margin-left: auto; min-width: 20px; height: 20px;
  border-radius: 10px; padding: 0 6px;
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}

/* ── CONTENT ── */
.content {
  flex: 1; overflow-y: auto;
  padding: 24px;
}

/* ─── USCITA VIEW ─── */
.uscita-header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 24px;
}
.uscita-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px; font-weight: 800; letter-spacing: 3px;
  text-transform: uppercase;
}
.uscita-time {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px; color: var(--muted); letter-spacing: 1px;
}
.uscita-stats {
  margin-left: auto; display: flex; gap: 12px;
}
.stat-chip {
  padding: 5px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase;
}

/* tabella uscita */
.uscita-table {
  width: 100%; border-collapse: collapse;
}
.uscita-table th {
  text-align: left; padding: 8px 14px;
  font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; font-weight: 700;
  color: var(--muted); border-bottom: 1px solid var(--border);
}
.uscita-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 14px; vertical-align: middle;
}
.uscita-table tr:hover td { background: rgba(255,255,255,.02); }
.cell-linea {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 700; letter-spacing: 1px;
}
.cell-tab {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px; color: var(--muted);
}
.cell-ora {
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px; color: var(--bright);
}
.cell-tipo {
  font-size: 11px; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted);
}

/* select vettura */
.vet-select {
  background: var(--bg2); border: 1px solid var(--border2);
  color: var(--bright); padding: 6px 10px;
  border-radius: 6px; font-family: 'Share Tech Mono', monospace;
  font-size: 13px; min-width: 120px; cursor: pointer;
  outline: none;
}
.vet-select:focus { border-color: var(--u1l); }
.vet-select.assigned { border-color: var(--green); color: var(--green); }

.stallo-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px; color: var(--muted);
  background: var(--bg2); padding: 4px 10px;
  border-radius: 5px; border: 1px solid var(--border);
}

/* stato vettura inline */
.stato-tag {
  display: inline-block; padding: 3px 9px;
  border-radius: 20px; font-size: 11px;
  font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase;
}

/* ─── VETTURE VIEW ─── */
.vetture-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.vettura-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px;
  transition: border-color .2s;
}
.vettura-card:hover { border-color: var(--border2); }
.vettura-card.ferma { border-color: #3a1111; }
.vettura-card.rientro { border-color: #3a2500; }
.vc-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.vc-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px; font-weight: 800; letter-spacing: 2px;
  line-height: 1;
}
.vc-info { flex: 1; }
.vc-model {
  font-size: 13px; font-weight: 600; color: var(--bright);
  line-height: 1.2;
}
.vc-tipo { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
.vc-bottom {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.vc-stallo {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px; color: var(--muted);
  background: var(--bg2); padding: 3px 8px; border-radius: 4px;
}

/* stato select */
.stato-select {
  background: var(--bg2); border: 1px solid var(--border2);
  color: var(--text); padding: 4px 8px;
  border-radius: 6px; font-size: 12px; cursor: pointer;
  outline: none; font-family: 'Barlow', sans-serif;
  margin-left: auto;
}

/* ─── RIENTRI VIEW ─── */
.rientri-day-notice {
  background: #1a0e00; border: 1px solid #5c3a00;
  border-radius: 8px; padding: 14px 18px;
  margin-bottom: 20px; font-size: 13px; color: #f97316;
  letter-spacing: .5px;
}
.rientri-table { width: 100%; border-collapse: collapse; }
.rientri-table th {
  text-align: left; padding: 8px 14px;
  font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; font-weight: 700;
  color: var(--muted); border-bottom: 1px solid var(--border);
}
.rientri-table td {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-size: 14px; vertical-align: middle;
}
.rientri-table tr:hover td { background: rgba(255,255,255,.02); }
.input-time {
  background: var(--bg2); border: 1px solid var(--border2);
  color: var(--bright); padding: 5px 10px;
  border-radius: 6px; font-family: 'Share Tech Mono', monospace;
  font-size: 13px; width: 90px; outline: none;
}
.input-time:focus { border-color: var(--orange); }
.input-note {
  background: var(--bg2); border: 1px solid var(--border2);
  color: var(--text); padding: 5px 10px;
  border-radius: 6px; font-size: 13px; width: 200px; outline: none;
  font-family: 'Barlow', sans-serif;
}
.input-note:focus { border-color: var(--border2); }
.btn-remove {
  background: none; border: 1px solid #3a1111;
  color: var(--red); padding: 4px 10px; border-radius: 5px;
  cursor: pointer; font-size: 12px;
  transition: background .15s;
}
.btn-remove:hover { background: #3a1111; }
.btn-add-rientro {
  margin-top: 16px;
  background: #1a0e00; border: 1px solid var(--orange);
  color: var(--orange); padding: 9px 18px; border-radius: 7px;
  cursor: pointer; font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; transition: background .15s;
}
.btn-add-rientro:hover { background: #2a1500; }

/* ─── LINEE VIEW ─── */
.linea-accordion {
  border: 1px solid var(--border); border-radius: 10px;
  overflow: hidden; margin-bottom: 12px;
}
.linea-head {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px; cursor: pointer;
  background: var(--panel);
  transition: background .15s;
}
.linea-head:hover { background: var(--bg2); }
.linea-name-big {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 800; letter-spacing: 2px;
}
.linea-tipo-tag {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  padding: 2px 8px; border-radius: 20px; font-weight: 700;
}
.tipo-urbana { background: #0d2a1a; color: var(--green); }
.tipo-suburbana { background: #1a1400; color: var(--yellow); }
.linea-tab-count { margin-left: auto; color: var(--muted); font-size: 13px; }
.linea-body { display: none; }
.linea-body.open { display: block; }
.tab-row {
  display: grid;
  grid-template-columns: 80px 100px 80px 1fr 120px;
  gap: 0; padding: 10px 18px;
  border-top: 1px solid var(--border);
  background: var(--bg2); font-size: 13px;
  align-items: center;
}
.tab-row:hover { background: #0f1119; }
.tab-code {
  font-family: 'Share Tech Mono', monospace;
  color: var(--muted);
}
.tab-time {
  font-family: 'Share Tech Mono', monospace;
  color: var(--bright);
}
.tab-ore { color: var(--muted); font-size: 12px; }
.tab-prop {
  font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
  padding: 2px 8px; border-radius: 20px; font-weight: 700;
  display: inline-block;
}
.prop-elettrico { background: #0a1f3a; color: var(--u1l); }
.prop-diesel { background: #2a1a00; color: var(--yellow); }
.prop-entrambi { background: #1a1a2a; color: var(--muted); }
.tab-uscita-badge {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; padding: 3px 10px;
  border-radius: 20px; text-align: center;
}

/* ─── MODAL (aggiunta rientro) ─── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); z-index: 1000;
  align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--panel); border: 1px solid var(--border2);
  border-radius: 12px; padding: 28px; width: 400px;
  box-shadow: 0 24px 64px rgba(0,0,0,.6);
}
.modal-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 800; letter-spacing: 2px;
  color: var(--bright); margin-bottom: 20px;
}
.modal label {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 6px; margin-top: 14px;
}
.modal select, .modal input[type=text], .modal input[type=time] {
  width: 100%; padding: 9px 12px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 7px; color: var(--bright);
  font-family: 'Barlow', sans-serif; font-size: 14px; outline: none;
}
.modal select:focus, .modal input:focus { border-color: var(--orange); }
.modal-btns { display: flex; gap: 10px; margin-top: 22px; }
.btn-modal-ok {
  flex: 1; padding: 11px;
  background: var(--orange); border: none; border-radius: 7px;
  color: #fff; font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; cursor: pointer; transition: opacity .15s;
}
.btn-modal-ok:hover { opacity: .85; }
.btn-modal-cancel {
  padding: 11px 20px;
  background: none; border: 1px solid var(--border2);
  border-radius: 7px; color: var(--muted);
  font-family: 'Barlow', sans-serif; font-size: 14px;
  cursor: pointer; transition: border .15s;
}
.btn-modal-cancel:hover { border-color: var(--text); }

/* ─── EMPTY STATE ─── */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--muted); font-size: 14px; letter-spacing: .5px;
}
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }

/* ─── TOASTS ─── */
#toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--panel); border: 1px solid var(--border2);
  border-radius: 8px; padding: 12px 20px;
  font-size: 13px; color: var(--bright);
  transform: translateY(80px); opacity: 0;
  transition: all .3s; z-index: 9999;
  pointer-events: none;
}
#toast.show { transform: translateY(0); opacity: 1; }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ─── responsive table ─── */
.table-wrap { overflow-x: auto; }

/* ─── propulsione chip on vettura card ─── */
.prop-chip {
  font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 10px; font-weight: 700;
}
</style>
</head>
<body>

<!-- ════════ LOGIN ════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">USCITE<span>TRACK</span></div>
    <div class="login-sub">Gestione uscite · Deposito</div>
    <label>Utente</label>
    <input type="text" id="loginUser" placeholder="capoturno" autocomplete="username">
    <label>Password</label>
    <input type="password" id="loginPass" placeholder="••••••" autocomplete="current-password">
    <button class="btn-login" onclick="doLogin()">Accedi</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ════════ APP ════════ -->
<div id="app">
  <!-- HEADER -->
  <header class="header">
    <div class="logo">USCITE<span>TRACK</span></div>
    <div class="header-sep"></div>
    <div class="date-nav">
      <button onclick="changeDay(-1)">‹</button>
      <div id="currentDate" onclick="toggleDateInput()"></div>
      <input type="date" id="dateInput" onchange="setDateFromInput()" onblur="hideDateInput()">
      <button onclick="changeDay(1)">›</button>
    </div>
    <div class="header-sep"></div>
    <div class="sync-dot" id="syncDot" title="Sincronizzazione Firebase"></div>
    <div class="user-badge" id="userBadge"></div>
    <button class="btn-logout" onclick="doLogout()">Esci</button>
  </header>

  <!-- BODY -->
  <div class="body-wrap">
    <!-- SIDEBAR -->
    <nav class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Uscite</div>
        <button class="nav-btn" data-view="u1" onclick="switchView('u1')">
          <span class="nav-icon">🌅</span> Prima
          <span class="nav-badge" id="badge-u1" style="background:var(--u1dim);color:var(--u1l)">0</span>
        </button>
        <button class="nav-btn" data-view="u2" onclick="switchView('u2')">
          <span class="nav-icon">☀️</span> Seconda
          <span class="nav-badge" id="badge-u2" style="background:var(--u2dim);color:var(--u2l)">0</span>
        </button>
        <button class="nav-btn" data-view="u3" onclick="switchView('u3')">
          <span class="nav-icon">🌆</span> Terza
          <span class="nav-badge" id="badge-u3" style="background:var(--u3dim);color:var(--u3l)">0</span>
        </button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Gestione</div>
        <button class="nav-btn" data-view="vetture" onclick="switchView('vetture')">
          <span class="nav-icon">🚌</span> Vetture

</div>

<!-- MODAL RIENTRO -->
<div class="modal-bg" id="modalRientro">
  <div class="modal">

</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// FIREBASE CONFIG (stesso progetto DepoTrack)
// ═══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyB6iU__138sUB4Tw_9DKWeat4WkN2RkVng",
  authDomain: "depotrack-d1d28.firebaseapp.com",
  databaseURL: "https://depotrack-d1d28-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "depotrack-d1d28",
  storageBucket: "depotrack-d1d28.firebasestorage.app",
  messagingSenderId: "967480447300",
  appId: "1:967480447300:web:7e79395a45964cdf348711"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Refs Firebase
const DEPO_REF    = db.ref('depotrack');     // dati DepoTrack (fleet, stalli)
const USCITE_REF  = db.ref('usciteapp');     // dati questo programma

// ═══════════════════════════════════════════════
// UTENTI (4 capoturno stessi permessi)
// ═══════════════════════════════════════════════
const UTENTI = {
  'capoturno1': { pass: 'ct1pass', nome: 'Capoturno 1' },
  'capoturno2': { pass: 'ct2pass', nome: 'Capoturno 2' },
  'capoturno3': { pass: 'ct3pass', nome: 'Capoturno 3' },
  'capoturno4': { pass: 'ct4pass', nome: 'Capoturno 4' },
};

// ═══════════════════════════════════════════════
// STATO GLOBALE
// ═══════════════════════════════════════════════
let currentUser = null;
let currentView = 'u1';
let currentDate = todayStr();

// Dati DepoTrack (letti in real-time)
let depoData = { fleet: [], corsie: [], assign: {}, stati: {}, tipi: {} };
// Dati UsciteApp
let usciteData = {};  // { giorni: {}, linee: {} }

// ═══════════════════════════════════════════════
// LINEE/TABELLE (dati di esempio - da sostituire con dati reali stasera)
// Le tabelle reali verranno caricate da Firebase o inserite manualmente
// ═══════════════════════════════════════════════
const LINEE_DEFAULT = [
  {
    id: 'L1', nome: 'Linea 1', tipo: 'urbana',
    tabelle: [
      { id: 'T1A', cod: '1A', orario: '05:30', ore: 7.0, prop: 'entrambi' },
      { id: 'T1B', cod: '1B', orario: '12:00', ore: 3.0, prop: 'elettrico' },
      { id: 'T1C', cod: '1C', orario: '15:30', ore: 8.5, prop: 'entrambi' },
    ]
  },
  {
    id: 'L2', nome: 'Linea 2', tipo: 'urbana',
    tabelle: [
      { id: 'T2A', cod: '2A', orario: '06:00', ore: 6.5, prop: 'elettrico' },
      { id: 'T2B', cod: '2B', orario: '13:30', ore: 3.5, prop: 'elettrico' },
      { id: 'T2C', cod: '2C', orario: '16:00', ore: 7.5, prop: 'elettrico' },
    ]
  },
  {
    id: 'L5', nome: 'Linea 5', tipo: 'suburbana',
    tabelle: [
      { id: 'T5A', cod: '5A', orario: '07:00', ore: 5.5, prop: 'diesel' },
      { id: 'T5B', cod: '5B', orario: '14:00', ore: 4.0, prop: 'diesel' },
      { id: 'T5C', cod: '5C', orario: '18:00', ore: 6.0, prop: 'diesel' },
    ]
  },
  {
    id: 'L8', nome: 'Linea 8', tipo: 'suburbana',
    tabelle: [
      { id: 'T8A', cod: '8A', orario: '06:30', ore: 8.0, prop: 'diesel' },
      { id: 'T8B', cod: '8B', orario: '17:00', ore: 9.5, prop: 'entrambi' },
    ]
  },
];

// ═══════════════════════════════════════════════
// UTILS DATE
// ═══════════════════════════════════════════════
function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}
function tomorrowStr() {
  const d = new Date(currentDate);
  d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0, 10);
}
function formatDateIT(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}
function changeDay(n) {
  const d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + n);
  currentDate = d.toISOString().slice(0, 10);
  document.getElementById('currentDate').textContent = formatDateIT(currentDate);
  render();
}
function toggleDateInput() {
  const inp = document.getElementById('dateInput');
  const lbl = document.getElementById('currentDate');
  inp.style.display = inp.style.display === 'none' ? 'block' : 'none';
  if (inp.style.display === 'block') {
    inp.value = currentDate; inp.style.display = 'block'; lbl.style.display = 'none'; inp.focus();
  }
}
function setDateFromInput() {
  const inp = document.getElementById('dateInput');
  if (inp.value) { currentDate = inp.value; }
  hideDateInput();
  render();
}
function hideDateInput() {
  document.getElementById('dateInput').style.display = 'none';
  const lbl = document.getElementById('currentDate');
  lbl.style.display = '';
  lbl.textContent = formatDateIT(currentDate);
}

// ═══════════════════════════════════════════════
// USCITA DETECTION
// ═══════════════════════════════════════════════
function getUscita(orario) {
  const [h, m] = orario.split(':').map(Number);
  const mins = h * 60 + m;
  if (mins >= 300 && mins < 690) return '1';   // 05:00 - 11:30
  if (mins >= 690 && mins < 900) return '2';   // 11:30 - 15:00
  return '3';                                   // 15:00 - fine
}

// ═══════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════
function doLogin() {
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  if (!UTENTI[u] || UTENTI[u].pass !== p) {
    err.textContent = 'Credenziali non valide.'; return;
  }
  currentUser = { id: u, ...UTENTI[u] };
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('userBadge').textContent = currentUser.nome;
  document.getElementById('currentDate').textContent = formatDateIT(currentDate);
  startFirebase();
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !currentUser) doLogin();
});
function doLogout() {
  currentUser = null;
  document.getElementById('loginScreen').style.display = '';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginErr').textContent = '';
}

// ═══════════════════════════════════════════════
// FIREBASE SYNC
// ═══════════════════════════════════════════════
function startFirebase() {
  // Leggi DepoTrack in real-time
  DEPO_REF.on('value', snap => {
    depoData = snap.val() || { fleet: [], corsie: [], assign: {}, stati: {}, tipi: {} };
    if (!depoData.fleet)  depoData.fleet  = [];
    if (!depoData.corsie) depoData.corsie = [];
    if (!depoData.assign) depoData.assign = {};
    if (!depoData.stati)  depoData.stati  = {};
    if (!depoData.tipi)   depoData.tipi   = {};
    updateBadges();
    render();
  });

  // Leggi UsciteApp in real-time
  USCITE_REF.on('value', snap => {
    usciteData = snap.val() || {};
    if (!usciteData.giorni) usciteData.giorni = {};
    if (!usciteData.linee)  usciteData.linee  = {};
    updateBadges();
    render();
  });

  syncDot('ok');
}

function saveUscite() {
  syncDot('syncing');
  USCITE_REF.set(usciteData).then(() => syncDot('ok')).catch(() => syncDot('err'));
}

// Salva stato vettura SU DEPOTRACK (aggiorna fleet array per indice)
function saveDepoVettura(vId, statoId) {
  const fleet = Array.isArray(depoData.fleet) ? depoData.fleet : Object.values(depoData.fleet);
  const idx = fleet.findIndex(v => v.id === vId);
  if (idx === -1) { toast('Vettura non trovata', true); return; }
  DEPO_REF.child('fleet').child(String(idx)).child('stato').set(statoId)
    .then(() => toast('Stato aggiornato su DepoTrack'))
    .catch(() => toast('Errore salvataggio', true));
}

function syncDot(s) {
  const d = document.getElementById('syncDot');
  d.className = 'sync-dot' + (s === 'ok' ? '' : s === 'syncing' ? ' syncing' : ' err');
}

// ═══════════════════════════════════════════════
// HELPERS DEPOTRACK
// ═══════════════════════════════════════════════
function getVetture() {
  // fleet in DepoTrack è un array: [{id, targa, model, type, stato, ...}]
  // assign: { stallId: vetId }
  const fleet = Array.isArray(depoData.fleet)
    ? depoData.fleet
    : Object.values(depoData.fleet || {});

  const assign = depoData.assign || {};
  // mapping inverso: vetId → stallId
  const stallByVet = {};
  for (const [stallId, vetId] of Object.entries(assign)) {
    if (vetId) stallByVet[String(vetId)] = stallId;
  }
  return fleet.filter(Boolean).map(v => ({
    ...v,
    stallo: stallByVet[v.id] || '—'
  }));
}

function getVetturaById(id) {
  const all = getVetture();
  return all.find(v => v.id === id);
}

function getStatoInfo(statoId) {
  const stati = depoData.stati || {};
  return stati[statoId] || { nome: statoId || 'N/D', colore: '#555' };
}

function getTipoInfo(tipoId) {
  const tipi = depoData.tipi || {};
  return tipi[tipoId] || { nome: tipoId || 'N/D', colore: '#555' };
}

// ═══════════════════════════════════════════════
// DATI GIORNO
// ═══════════════════════════════════════════════
function getDayData(date) {
  return (usciteData.giorni || {})[date] || { uscita1: {}, uscita2: {}, uscita3: {}, rientri: {} };
}
function setDayData(date, data) {
  if (!usciteData.giorni) usciteData.giorni = {};
  usciteData.giorni[date] = data;
  saveUscite();
}

function getLinee() {
  // Prima usa linee da Firebase, poi fallback a quelle di default
  const stored = usciteData.linee;
  if (stored && Object.keys(stored).length > 0) {
    return Object.values(stored);
  }
  return LINEE_DEFAULT;
}

function getTabelle(uscitaNum) {
  const linee = getLinee();
  const result = [];
  for (const linea of linee) {
    for (const tab of (linea.tabelle || [])) {
      if (getUscita(tab.orario) === String(uscitaNum)) {
        result.push({ ...tab, lineaId: linea.id, lineaNome: linea.nome, lineaTipo: linea.tipo });
      }
    }
  }
  return result.sort((a, b) => a.orario.localeCompare(b.orario));
}

// ═══════════════════════════════════════════════
// VIEW ROUTING
// ═══════════════════════════════════════════════
function switchView(v) {
  currentView = v;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === v);
  });
  render();
}

function render() {
  const c = document.getElementById('mainContent');
  if (!currentUser) return;
  switch (currentView) {
    case 'u1': c.innerHTML = renderUscita(1); break;
    case 'u2': c.innerHTML = renderUscita(2); break;
    case 'u3': c.innerHTML = renderUscita(3); break;
    case 'vetture': c.innerHTML = renderVetture(); break;
    case 'rientri': c.innerHTML = renderRientri(); break;
    case 'linee': c.innerHTML = renderLinee(); break;
  }
}

// ═══════════════════════════════════════════════
// RENDER USCITA
// ═══════════════════════════════════════════════
function renderUscita(num) {
  const tabelle = getTabelle(num);
  const dayData = getDayData(currentDate);
  const uscitaKey = 'uscita' + num;
  const assignments = dayData[uscitaKey] || {};

  const colors = { 1: 'var(--u1l)', 2: 'var(--u2l)', 3: 'var(--u3l)' };
  const labels = { 1: 'Prima Uscita', 2: 'Seconda Uscita', 3: 'Terza Uscita' };
  const times  = { 1: '05:00 – 11:30', 2: '11:30 – 15:00', 3: '15:00 – 02:30' };
  const icons  = { 1: '🌅', 2: '☀️', 3: '🌆' };

  const vetture = getVetture().filter(v => {
    const statoInfo = getStatoInfo(v.stato);
    return !statoInfo.nome?.toLowerCase().includes('ferma');
  });

  const assegnate = tabelle.filter(t => assignments[t.id]?.vettura).length;

  let rows = '';
  if (tabelle.length === 0) {
    rows = `<tr><td colspan="7">
      <div class="empty-state">
        <div class="empty-icon">${icons[num]}</div>
        Nessuna tabella per questa uscita.<br>
        Aggiungi linee e tabelle dalla sezione 🗺️ Linee.
      </div>
    </td></tr>`;
  } else {
    for (const tab of tabelle) {
      const asgn = assignments[tab.id] || {};
      const hasVet = !!asgn.vettura;
      const vet = hasVet ? getVetturaById(asgn.vettura) : null;
      const stallo = vet ? vet.stallo : '—';

      // Check rientro domani (segnalato oggi)
      const tomorrowData = getDayData(tomorrowStr());
      const isRientro = !!(tomorrowData.rientri || {})[asgn.vettura];

      const vetOptions = vetture.map(v => {
        const selected = asgn.vettura === v.id ? 'selected' : '';
        return `<option value="${v.id}" ${selected}>N° ${v.targa || v.id}${v.model ? ' – ' + v.model : ''}</option>`;
      }).join('');

      rows += `<tr>
        <td class="cell-linea" style="color:${colors[num]}">${tab.lineaNome}</td>
        <td class="cell-tab">${tab.cod || tab.id}</td>
        <td class="cell-ora">${tab.orario}</td>
        <td class="cell-tipo">
          <span class="tab-prop prop-${tab.prop || 'entrambi'}">${tab.prop || 'entrambi'}</span>
        </td>
        <td>
          <select class="vet-select ${hasVet ? 'assigned' : ''}"
            onchange="assignVettura(${num}, '${tab.id}', this.value)">
            <option value="">— Seleziona —</option>
            ${vetOptions}
          </select>
          ${isRientro && hasVet ? '<span style="color:var(--orange);font-size:11px;margin-left:6px">🔧 rientro</span>' : ''}
        </td>
        <td><span class="stallo-badge">${stallo}</span></td>
        <td>
          ${hasVet && vet ? `<span class="stato-tag" style="background:${getStatoInfo(vet.stato).colore}22;color:${getStatoInfo(vet.stato).colore}">${getStatoInfo(vet.stato).nome || '—'}</span>` : '<span style="color:var(--muted);font-size:12px">—</span>'}
        </td>
      </tr>`;
    }
  }

  return `
    <div class="uscita-header">
      <div>
        <div class="uscita-title" style="color:${colors[num]}">${icons[num]} ${labels[num]}</div>
        <div class="uscita-time">${times[num]}</div>
      </div>
      <div class="uscita-stats">
        <span class="stat-chip" style="background:${colors[num]}22;color:${colors[num]}">
          ${assegnate} / ${tabelle.length} assegnate
        </span>
      </div>
    </div>
    <div class="table-wrap">
      <table class="uscita-table">
        <thead>
          <tr>
            <th>Linea</th>
            <th>Tabella</th>
            <th>Orario</th>
            <th>Propulsione</th>
            <th>Vettura</th>
            <th>Stallo</th>
            <th>Stato</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function assignVettura(uscitaNum, tabId, vetId) {
  const dayData = getDayData(currentDate);
  const key = 'uscita' + uscitaNum;
  if (!dayData[key]) dayData[key] = {};
  if (vetId) {
    dayData[key][tabId] = { vettura: vetId };
  } else {
    delete dayData[key][tabId];
  }
  setDayData(currentDate, dayData);
  toast('Vettura assegnata');
  render();
}

// ═══════════════════════════════════════════════
// RENDER VETTURE
// ═══════════════════════════════════════════════
function renderVetture() {
  const vetture = getVetture();
  const stati = depoData.stati || {};

  if (vetture.length === 0) {
    return `<div class="empty-state">
      <div class="empty-icon">🚌</div>
      Nessuna vettura trovata in DepoTrack.<br>
      <span style="font-size:12px;color:var(--muted)">Inserisci le vetture in DepoTrack e si sincronizzeranno automaticamente.</span>
    </div>`;
  }

  const cards = vetture.map(v => {
    const stato = getStatoInfo(v.stato);
    const tipo  = getTipoInfo(v.type);
    const isFerma = stato.nome?.toLowerCase().includes('ferma');
    const tomorrowData = getDayData(tomorrowStr());
    const isRientro = !!(tomorrowData.rientri || {})[v.id];

    const statiOptions = Object.entries(stati).map(([sid, s]) =>
      `<option value="${sid}" ${v.stato === sid ? 'selected' : ''}>${s.nome}</option>`
    ).join('');

    return `<div class="vettura-card ${isFerma ? 'ferma' : ''} ${isRientro ? 'rientro' : ''}">
      <div class="vc-top">
        <div class="vc-num" style="color:${tipo.colore || 'var(--bright)'}">${v.targa || v.id}</div>
        <div class="vc-info">
          <div class="vc-model">${v.model || '—'}</div>
          <div class="vc-tipo">${tipo.nome || '—'}</div>
        </div>
        ${isRientro ? '<span style="color:var(--orange);font-size:18px" title="A rientro domani">🔧</span>' : ''}
        ${isFerma ? '<span style="color:var(--red);font-size:18px" title="Ferma">🔴</span>' : ''}
      </div>
      <div class="vc-bottom">
        <span class="vc-stallo">🅿 ${v.stallo}</span>
        <span class="prop-chip prop-${v.propulsione || 'entrambi'}">${v.propulsione || '—'}</span>
        <select class="stato-select" onchange="cambiaStato('${v.id}', this.value)">
          ${statiOptions}
        </select>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="uscita-header">
      <div>
        <div class="uscita-title" style="color:var(--green)">🚌 Vetture</div>
        <div class="uscita-time">Sincronizzate con DepoTrack · ${vetture.length} mezzi</div>
      </div>
    </div>
    <div class="vetture-grid">${cards}</div>`;
}

function cambiaStato(vetId, statoId) {
  // Aggiorna stato direttamente su DepoTrack Firebase
  saveDepoVettura(vetId, statoId);
}

// ═══════════════════════════════════════════════
// RENDER RIENTRI
// ═══════════════════════════════════════════════
function renderRientri() {
  // I rientri di OGGI sono quelli segnalati IERI (escono oggi mattina)
  // Quelli che segnaliamo OGGI usciranno DOMANI
  const todayData = getDayData(currentDate);
  const rientriOggi = todayData.rientri || {};

  let rows = '';
  const vetIds = Object.keys(rientriOggi);
  if (vetIds.length === 0) {
    rows = `<tr><td colspan="4">
      <div class="empty-state" style="padding:30px">
        <div class="empty-icon">🔧</div>
        Nessuna vettura a rientro per oggi.<br>
        <span style="font-size:12px;color:var(--muted)">Le vetture a rientro vengono segnalate il giorno prima.</span>
      </div>
    </td></tr>`;
  } else {
    for (const vId of vetIds) {
      const r = rientriOggi[vId];
      const vet = getVetturaById(vId);
      rows += `<tr>
        <td>
          <strong style="font-family:'Share Tech Mono',monospace;color:var(--orange)">
            N° ${vet ? (vet.targa || vId) : vId}
          </strong>
          ${vet ? `<span style="color:var(--muted);font-size:12px;margin-left:8px">${vet.model || ''}</span>` : ''}
        </td>
        <td><span class="stallo-badge">${vet ? vet.stallo : '—'}</span></td>
        <td><span style="font-family:'Share Tech Mono',monospace;color:var(--bright)">${r.ora || '09:30'}</span></td>
        <td><span style="color:var(--muted);font-size:13px">${r.note || '—'}</span></td>
      </tr>`;
    }
  }

  // Segnalazione per domani
  const tomorrowData = getDayData(tomorrowStr());
  const rientriDomani = tomorrowData.rientri || {};
  let rowsDomani = '';
  const vetIdsDomani = Object.keys(rientriDomani);
  if (vetIdsDomani.length === 0) {
    rowsDomani = `<tr><td colspan="5">
      <div style="padding:20px;color:var(--muted);font-size:13px;text-align:center">
        Nessuna vettura segnalata per domani.
      </div>
    </td></tr>`;
  } else {
    for (const vId of vetIdsDomani) {
      const r = rientriDomani[vId];
      const vet = getVetturaById(vId);
      rowsDomani += `<tr>
        <td>
          <strong style="font-family:'Share Tech Mono',monospace;color:var(--orange)">
            N° ${vet ? (vet.targa || vId) : vId}
          </strong>
          ${vet ? `<span style="color:var(--muted);font-size:12px;margin-left:8px">${vet.model || ''}</span>` : ''}
        </td>
        <td><span class="stallo-badge">${vet ? vet.stallo : '—'}</span></td>
        <td>
          <input class="input-time" type="time" value="${r.ora || '09:30'}"
            onchange="updateRientroField('${tomorrowStr()}','${vId}','ora',this.value)">
        </td>
        <td>
          <input class="input-note" type="text" value="${r.note || ''}" placeholder="Note..."
            onblur="updateRientroField('${tomorrowStr()}','${vId}','note',this.value)">
        </td>
        <td>
          <button class="btn-remove" onclick="removeRientro('${tomorrowStr()}','${vId}')">✕</button>
        </td>
      </tr>`;
    }
  }

  return `
    <div class="uscita-header">
      <div>
        <div class="uscita-title" style="color:var(--orange)">🔧 A Rientro</div>
        <div class="uscita-time">Gestione vetture in manutenzione</div>
      </div>
    </div>
    <div class="rientri-day-notice">
      ℹ️ Le vetture a rientro escono la mattina e rientrano tra le 09:00 e le 10:00 per manutenzione full service.
    </div>

    <div style="margin-bottom:8px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--u1l);text-transform:uppercase">
      A rientro oggi · ${formatDateIT(currentDate)}
    </div>
    <div class="table-wrap" style="margin-bottom:28px">
      <table class="rientri-table">
        <thead><tr>
          <th>Vettura</th><th>Stallo</th><th>Ora rientro</th><th>Note</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <div style="margin-bottom:8px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--orange);text-transform:uppercase">
      Segnalazioni per domani · ${formatDateIT(tomorrowStr())}
    </div>
    <div class="table-wrap">
      <table class="rientri-table">
        <thead><tr>
          <th>Vettura</th><th>Stallo</th><th>Ora rientro</th><th>Note</th><th></th>
        </tr></thead>
        <tbody>${rowsDomani}</tbody>
      </table>
    </div>
    <button class="btn-add-rientro" onclick="openModalRientro()">+ Aggiungi vettura a rientro</button>`;
}

function openModalRientro() {
  const vetture = getVetture();
  const sel = document.getElementById('mVettura');
  sel.innerHTML = vetture.map(v =>
    `<option value="${v.id}">N° ${v.targa || v.id} – ${v.model || '—'} (${v.stallo})</option>`
  ).join('');
  document.getElementById('mOra').value = '09:30';
  document.getElementById('mNote').value = '';
  document.getElementById('modalRientro').classList.add('open');
}
function closeModal() {
  document.getElementById('modalRientro').classList.remove('open');
}
function saveRientro() {
  const vId = document.getElementById('mVettura').value;
  const ora  = document.getElementById('mOra').value;
  const note = document.getElementById('mNote').value;
  if (!vId) return;
  const data = getDayData(tomorrowStr());
  if (!data.rientri) data.rientri = {};
  data.rientri[vId] = { ora, note };
  setDayData(tomorrowStr(), data);
  closeModal();
  toast('Vettura aggiunta a rientro per domani');
  render();
}
function updateRientroField(date, vId, field, val) {
  const data = getDayData(date);
  if (!data.rientri) data.rientri = {};
  if (!data.rientri[vId]) data.rientri[vId] = {};
  data.rientri[vId][field] = val;
  setDayData(date, data);
}
function removeRientro(date, vId) {
  const data = getDayData(date);
  if (data.rientri) { delete data.rientri[vId]; }
  setDayData(date, data);
  render();
  toast('Rimossa');
}

// ═══════════════════════════════════════════════
// RENDER LINEE
// ═══════════════════════════════════════════════
function renderLinee() {
  const linee = getLinee();
  const colors = { '1': 'var(--u1l)', '2': 'var(--u2l)', '3': 'var(--u3l)' };
  const labels = { '1': 'Prima', '2': 'Seconda', '3': 'Terza' };

  const cards = linee.map(linea => {
    const tabRows = (linea.tabelle || []).map(tab => {
      const u = getUscita(tab.orario);
      const uc = colors[u];
      return `<div class="tab-row">
        <span class="tab-code">${tab.cod || tab.id}</span>
        <span class="tab-time">${tab.orario}</span>
        <span class="tab-ore">${tab.ore}h</span>
        <span class="tab-prop prop-${tab.prop || 'entrambi'}">${tab.prop || 'entrambi'}</span>
        <span class="tab-uscita-badge" style="background:${uc}22;color:${uc}">${labels[u]}</span>
      </div>`;
    }).join('');

    return `<div class="linea-accordion">
      <div class="linea-head" onclick="this.nextElementSibling.classList.toggle('open')">
        <div class="linea-name-big">${linea.nome}</div>
        <span class="linea-tipo-tag tipo-${linea.tipo}">${linea.tipo}</span>
        <span class="linea-tab-count">${(linea.tabelle || []).length} tabelle</span>
        <span style="color:var(--muted);margin-left:8px">▾</span>
      </div>
      <div class="linea-body">${tabRows}</div>
    </div>`;
  }).join('');

  return `
    <div class="uscita-header">
      <div>
        <div class="uscita-title" style="color:var(--yellow)">🗺️ Linee e Tabelle</div>
        <div class="uscita-time">${linee.length} linee · Dati di esempio (verranno sostituiti)</div>
      </div>
    </div>
    <div style="padding:12px 16px;background:#1a1400;border:1px solid #5c4a00;border-radius:8px;margin-bottom:20px;font-size:13px;color:var(--yellow)">
      ⚠️ Questi sono dati di esempio. Stasera sostituiamo con le linee e tabelle reali.
    </div>
    ${cards}`;
}

// ═══════════════════════════════════════════════
// BADGES
// ═══════════════════════════════════════════════
function updateBadges() {
  const vetture = getVetture();
  document.getElementById('badge-vet').textContent = vetture.length;

  for (const n of [1, 2, 3]) {
    document.getElementById('badge-u' + n).textContent = getTabelle(n).length;
  }

  const tomorrowData = getDayData(tomorrowStr());
  const rientriCount = Object.keys(tomorrowData.rientri || {}).length;
  const todayData = getDayData(currentDate);
  const rientriOggiCount = Object.keys(todayData.rientri || {}).length;
  document.getElementById('badge-rie').textContent = rientriCount + rientriOggiCount;
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
function toast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isErr ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
switchView('u1');
</script>
