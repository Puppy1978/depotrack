<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTERSERVICE VIEWER</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#05080c;--sur:#0d1520;--sur2:#111e2d;--acc:#f0a500;--grn:#2ecc71;--red:#e74c3c;--blu:#4fa3e0;--txt:#e8edf2;--mut:#5a7a9a;--mut2:#3a5a7a;--brd:#1a2a3a;--mono:'Share Tech Mono',monospace;--sans:'Barlow Condensed',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;}

/* SPLASH */
.is-splash{position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at center,#0a1428 0%,#050810 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;}
.is-scene{position:relative;width:100%;height:clamp(160px,28vw,250px);overflow:visible;flex-shrink:0;}
.is-bus{font-size:clamp(70px,14vw,120px);position:absolute;line-height:1;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));top:50%;transform:translateY(-50%);}
.is-rope{position:absolute;height:3px;background:linear-gradient(90deg,#999,#666);border-radius:2px;top:50%;transform:translateY(-50%);display:none;}
.is-logo-wrap{position:absolute;top:50%;transform:translateY(-50%);opacity:0;transition:opacity .4s;}
.is-logo-wrap img{height:clamp(60px,11vw,100px);width:auto;background:white;padding:8px 12px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.5);display:block;}
.is-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(13px,3vw,22px);letter-spacing:6px;color:#4fa3e0;opacity:0;margin-top:20px;transition:opacity .6s;}
.is-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.8vw,13px);letter-spacing:4px;color:#2a4a6a;opacity:0;margin-top:6px;transition:opacity .6s;}
.is-tap{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:#1a3a5a;margin-top:24px;animation:is-blink 1s ease 3.5s infinite alternate;}
@keyframes is-blink{from{opacity:0;}to{opacity:.7;}}
.is-out{animation:is-fadeout .4s ease forwards!important;}
@keyframes is-fadeout{to{opacity:0;}}

/* HEADER */
header{background:var(--sur);border-bottom:2px solid var(--blu);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{font-size:22px;}
.logo-name{font-weight:900;font-size:18px;letter-spacing:3px;color:#4fa3e0;}
.logo-sub{font-family:var(--mono);font-size:8px;color:var(--mut);letter-spacing:1px;}
.hright{display:flex;align-items:center;gap:10px;}
.hstat{display:flex;align-items:center;gap:5px;background:var(--sur2);border:1px solid var(--brd);padding:4px 10px;font-family:var(--mono);font-size:10px;}
.hd{width:6px;height:6px;border-radius:50%;animation:bl 2s infinite;}
.hd-g{background:var(--grn);}
.hd-r{background:var(--red);animation-duration:1.8s;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
.sync-dot{font-family:var(--mono);font-size:10px;color:var(--grn);}

/* FILTRI */
.filtri{background:var(--sur);border-bottom:1px solid var(--brd);padding:8px 16px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex-shrink:0;}
.filtri-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--mut);margin-right:4px;}
.fbtn{background:transparent;border:1px solid var(--brd);color:var(--mut);font-family:var(--mono);font-size:10px;padding:4px 10px;cursor:pointer;letter-spacing:1px;transition:all .12s;}
.fbtn:hover,.fbtn.on{border-color:#4fa3e0;color:#4fa3e0;background:rgba(79,163,224,.07);}
.cerca{background:var(--bg);border:1px solid var(--brd);color:var(--txt);font-family:var(--mono);font-size:11px;padding:5px 10px;outline:none;width:180px;margin-left:auto;}
.cerca:focus{border-color:#4fa3e0;}

/* FLEET */
.main{flex:1;overflow-y:auto;padding:12px 16px;}
.fleet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.vcard{background:var(--sur);border:1px solid var(--brd);cursor:pointer;transition:all .13s;position:relative;}
.vcard:hover{border-color:#4fa3e0;transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,163,224,.15);}
.vcard-header{padding:10px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--brd);}
.vcard-num{font-family:var(--mono);font-size:22px;font-weight:bold;letter-spacing:2px;}
.vcard-info{flex:1;min-width:0;}
.vcard-mod{font-size:13px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vcard-tipo{font-family:var(--mono);font-size:9px;letter-spacing:1px;padding:2px 6px;border:1px solid;margin-top:3px;display:inline-block;}
.vcard-body{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;}
.vcard-stato{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;}
.vcard-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.vcard-stallo{font-family:var(--mono);font-size:16px;font-weight:bold;color:#f0a500;letter-spacing:1px;}
.vcard-turno{font-family:var(--mono);font-size:11px;font-weight:bold;padding:2px 7px;border:1px solid;}
.vcard-postit{position:absolute;top:8px;right:8px;font-size:14px;opacity:.7;}
.vcard.ferma{border-left:3px solid var(--red);animation:fp 2s ease-in-out infinite;}
.vcard.fermat{border-left:3px solid var(--acc);}
.vcard.chiamata{border:2px solid #3498db;animation:cp 1.2s ease-in-out infinite;}
@keyframes cp{0%,100%{border-color:#3498db;box-shadow:0 0 0 3px rgba(52,152,219,.4);}50%{border-color:#5dade2;box-shadow:0 0 0 3px rgba(52,152,219,.9);}}
.empty{text-align:center;padding:60px 20px;font-family:var(--mono);font-size:12px;color:var(--mut);letter-spacing:2px;}

/* POPUP */
.popup-ov{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;padding:16px;}
.popup-box{background:var(--sur);border:2px solid #4fa3e0;border-top:4px solid #4fa3e0;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;}
.popup-hdr{padding:16px;border-bottom:1px solid var(--brd);display:flex;align-items:flex-start;gap:14px;}
.popup-num{font-family:var(--mono);font-size:36px;font-weight:bold;letter-spacing:3px;}
.popup-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.popup-row{display:flex;align-items:center;gap:10px;}
.popup-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--mut);text-transform:uppercase;width:90px;flex-shrink:0;}
.popup-val{font-size:15px;font-weight:600;}
.popup-close{margin-left:auto;background:transparent;border:none;color:var(--mut);font-size:20px;cursor:pointer;padding:4px;}
.popup-close:hover{color:var(--red);}
.postit-section{margin:0 16px 16px;background:#fffde0;padding:12px;}
.postit-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:#888;margin-bottom:6px;}
.postit-textarea{width:100%;background:transparent;border:none;border-bottom:1px dashed #ccc;color:#333;font-family:'Share Tech Mono',monospace;font-size:12px;resize:none;outline:none;min-height:80px;line-height:1.6;}
.postit-footer{display:flex;justify-content:flex-end;margin-top:8px;}
.postit-save{background:#4fa3e0;color:#fff;border:none;font-family:var(--mono);font-size:10px;font-weight:bold;padding:5px 14px;cursor:pointer;letter-spacing:1px;}
.postit-saved{font-family:var(--mono);font-size:9px;color:#888;margin-top:4px;text-align:right;}
</style>
</head>
<body>

<!-- SPLASH -->
<div class="is-splash" id="is-splash" onclick="closeSplash()">
  <div class="is-scene" id="is-scene">
    <div class="is-bus" id="is-bus">🚌</div>
  </div>
  <div class="is-title" id="is-title">INTERSERVICE VIEWER</div>
  <div class="is-sub" id="is-sub">VISUALIZZAZIONE PARCO MEZZI</div>
  <div class="is-tap">▶ tocca per entrare</div>
</div>



<header>
  <div class="logo">
    <div class="logo-icon">🚌</div>
    <div>
      <div class="logo-name">INTERSERVICE VIEWER</div>
      <div class="logo-sub">VISUALIZZAZIONE PARCO MEZZI</div>
    </div>
  </div>
  <div class="hright">
    <div class="hstat"><div class="hd hd-g"></div><span id="s-tot">—</span></div>
    <div class="hstat"><div class="hd hd-r"></div><span id="s-ferme">—</span></div>
    <div class="sync-dot" id="sync">● ...</div>
  </div>
</header>

<div class="filtri">
  <span class="filtri-label">TIPOLOGIA:</span>
  <button class="fbtn on" id="fb-all">TUTTE</button>
  <div id="tipo-btns"></div>
  <input class="cerca" id="cerca" placeholder="🔍 Cerca n. vettura...">
</div>

<div class="main">
  <div class="fleet-grid" id="fleet-grid">
    <div class="empty">⏳ Caricamento...</div>
  </div>
</div>

<div class="popup-ov" id="popup" style="display:none" onclick="if(event.target===this)closePopup()">
  <div class="popup-box">
    <div class="popup-hdr">
      <div>
        <div class="popup-num" id="p-num">—</div>
        <div style="font-size:14px;color:var(--mut);margin-top:3px;" id="p-mod">—</div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--txt);font-weight:bold;margin-top:4px;" id="p-stall">—</div>
      </div>
      <button class="popup-close" onclick="closePopup()">✕</button>
    </div>
    <div class="popup-body">
      <div class="popup-row"><div class="popup-label">Tipologia</div><span id="p-tipo" style="font-family:var(--mono);font-size:11px;padding:2px 8px;border:1px solid;">—</span></div>
      <div class="popup-row"><div class="popup-label">Stato</div><div style="display:flex;align-items:center;gap:8px;"><div id="p-stato-dot" style="width:10px;height:10px;border-radius:50%;"></div><div class="popup-val" id="p-stato">—</div></div></div>
      <div class="popup-row"><div class="popup-label">Posizione</div><div class="popup-val" id="p-pos" style="font-size:13px;">—</div></div>
      <div class="popup-row" id="p-turno-row" style="display:none"><div class="popup-label">Turno</div><div class="popup-val" id="p-turno">—</div></div>
      <div class="popup-row"><div class="popup-label">Anno</div><div class="popup-val" id="p-anno">—</div></div>
    </div>
    <div class="postit-section">
      <div class="postit-label">📝 NOTE INTERSERVICE</div>
      <textarea class="postit-textarea" id="postit-text" placeholder="Scrivi una nota su questa vettura..."></textarea>
      <div class="postit-footer"><button class="postit-save" onclick="savePostit()">💾 SALVA</button></div>
      <div class="postit-saved" id="postit-saved"></div>
    </div>
  </div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyB6iU__138sUB4Tw_9DKWeat4WkN2RkVng",
  authDomain: "depotrack-d1d28.firebaseapp.com",
  databaseURL: "https://depotrack-d1d28-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "depotrack-d1d28",
  storageBucket: "depotrack-d1d28.firebasestorage.app",
  messagingSenderId: "967480447300",
  appId: "1:967480447300:web:7e79395a45964cdf348711"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const DB_REF = db.ref('depotrack');
const POSTIT_REF = db.ref('interservice_postit');
const TR_REF = db.ref('depotrack_turni');

let S=null, turni={}, postits={}, curFilter='all', curSearch='', curVid=null;
const TIPI_VISIBILI=['u2','u3','s1','s2'];

// SPLASH ANIMAZIONE
(function(){
  const bus=document.getElementById('is-bus');
  const title=document.getElementById('is-title');
  const sub=document.getElementById('is-sub');
  if(!bus)return;
  const W=window.innerWidth;
  const BUS_EM=Math.min(120,W*0.14);
  const targetBus=(W-BUS_EM)/2;
  bus.style.left='-'+W+'px';
  bus.style.transform='scaleX(-1)';
  let startT=null,phase='enter';
  function ease(t){return 1-Math.pow(1-t,3);}
  function tick(ts){
    if(!startT)startT=ts;
    const t=(ts-startT)/1000;
    if(phase==='enter'){
      const p=Math.min(t/2.8,1);
      bus.style.left=(-W+(targetBus+W)*ease(p))+'px';
      if(p>=1){phase='brake';startT=ts;}
    } else if(phase==='brake'){
      const p=Math.min(t/0.6,1);
      bus.style.left=(targetBus+Math.sin(p*Math.PI)*12*(1-p))+'px';
      if(p>=1){
        phase='done';
        bus.style.left=targetBus+'px';
        title.style.opacity='1';
        setTimeout(()=>{sub.style.opacity='1';},400);
        return;
      }
    } else return;
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

function closeSplash(){
  const s=document.getElementById('is-splash');
  if(s){s.classList.add('is-out');setTimeout(()=>s.remove(),400);}
}

// FIREBASE LISTENERS
DB_REF.on('value',snap=>{
  S=snap.val();
  if(!S)return;
  if(!S.tipi)S.tipi=[];if(!S.stati)S.stati=[];if(!S.assign)S.assign={};if(!S.fleet)S.fleet=[];
  buildFilters();buildFleet();updateStats();
  document.getElementById('sync').textContent='● LIVE';
  document.getElementById('sync').style.color='var(--grn)';
});
TR_REF.on('value',snap=>{turni=snap.val()||{};if(S)buildFleet();});
POSTIT_REF.on('value',snap=>{postits=snap.val()||{};if(S)buildFleet();});
db.ref('.info/connected').on('value',snap=>{
  const el=document.getElementById('sync');
  el.textContent=snap.val()?'● LIVE':'⚠ OFFLINE';
  el.style.color=snap.val()?'var(--grn)':'var(--red)';
});

function gTipo(id){return S.tipi.find(t=>t.id===id)||{nome:'?',code:'?',colore:'#888'};}
function gStato(id){return S.stati.find(s=>s.id===id)||{nome:'?',colore:'#888'};}
function gStall(vid){const e=Object.entries(S.assign).find(([s,v])=>v===vid);return e?e[0]:null;}
function fmtStall(sid){
  if(!sid)return'—';
  // FILAA-17 → FILA A-17, FILAC-5 → FILA C-5, TORRE-6 → TORRE-6
  return sid.replace(/^([A-Z]+?)([A-Z])(-\d+)$/,(m,prefix,letter,num)=>{
    if(prefix.toUpperCase()==='FILA') return 'FILA '+letter+num;
    return sid;
  });
}
function tipoVis(typeId){const t=S.tipi.find(x=>x.id===typeId);return t&&TIPI_VISIBILI.includes(t.code);}

function buildFilters(){
  const el=document.getElementById('tipo-btns');el.innerHTML='';
  S.tipi.filter(t=>TIPI_VISIBILI.includes(t.code)).forEach(t=>{
    const cnt=S.fleet.filter(v=>v.type===t.id).length;
    const b=document.createElement('button');
    b.className='fbtn'+(curFilter===t.id?' on':'');
    b.innerHTML=`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${t.colore};margin-right:4px;"></span>${t.nome} <span style="opacity:.6">${cnt}</span>`;
    b.onclick=()=>{curFilter=t.id;document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');buildFleet();};
    el.appendChild(b);
  });
  document.getElementById('fb-all').onclick=()=>{curFilter='all';document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));document.getElementById('fb-all').classList.add('on');buildFleet();};
}

function buildFleet(){
  if(!S)return;
  let fleet=S.fleet.filter(v=>tipoVis(v.type));
  if(curFilter!=='all')fleet=fleet.filter(v=>v.type===curFilter);
  if(curSearch){const q=curSearch.toLowerCase();fleet=fleet.filter(v=>v.targa.toLowerCase().includes(q)||v.model.toLowerCase().includes(q));}
  fleet.sort((a,b)=>(parseInt(a.targa)||0)-(parseInt(b.targa)||0));
  const grid=document.getElementById('fleet-grid');
  if(!fleet.length){grid.innerHTML='<div class="empty">Nessuna vettura trovata</div>';return;}
  grid.innerHTML='';
  fleet.forEach(v=>{
    const t=gTipo(v.type),st=gStato(v.stato),sid=gStall(v.id);
    const turno=sid?turni[sid]:'';
    const hasPostit=postits[v.id]&&postits[v.id].trim();
    const statiF=S.stati.filter(s=>s.id.toLowerCase().includes('ferm')||s.nome.toLowerCase().includes('ferm')).map(s=>s.id);
    const ferma=statiF.includes(v.stato);
    const isChiamata=S.stati.some(s=>s.id===v.stato&&s.nome.toUpperCase().includes('CHIAMAT'));
    const card=document.createElement('div');
    card.className='vcard'+(ferma?' '+(v.stato==='fermat'?'fermat':'ferma'):'')+(isChiamata?' chiamata':'');
    card.innerHTML=`
      ${hasPostit?'<div class="vcard-postit">📝</div>':''}
      <div class="vcard-header">
        <div class="vcard-num" style="color:${ferma?st.colore:t.colore}">${v.targa}</div>
        <div class="vcard-info">
          <div class="vcard-mod">${v.model}</div>
          <span class="vcard-tipo" style="color:${t.colore};border-color:${t.colore}">${t.nome}</span>
        </div>
      </div>
      <div class="vcard-body">
        <div class="vcard-stato"><div class="vcard-dot" style="background:${st.colore}"></div><span>${st.nome}</span></div>
        <div style="display:flex;align-items:center;gap:8px;">
          ${sid?`<div class="vcard-stallo">📍 ${fmtStall(sid)}</div>`:'<div class="vcard-stallo" style="color:var(--mut2)">—</div>'}
          ${turno?`<div class="vcard-turno" style="color:${turno==='D'?'#2ecc71':turno==='2'?'#4fa3e0':'#f0a500'};border-color:${turno==='D'?'#2ecc71':turno==='2'?'#4fa3e0':'#f0a500'}">${turno}</div>`:''}
        </div>
      </div>`;
    card.onclick=()=>openPopup(v.id);
    grid.appendChild(card);
  });
}

function updateStats(){
  if(!S)return;
  const fleet=S.fleet.filter(v=>tipoVis(v.type));
  const statiF=S.stati.filter(s=>s.id.toLowerCase().includes('ferm')||s.nome.toLowerCase().includes('ferm')).map(s=>s.id);
  document.getElementById('s-tot').textContent=fleet.length+' mezzi';
  document.getElementById('s-ferme').textContent=fleet.filter(v=>statiF.includes(v.stato)).length+' ferme';
}

function openPopup(vid){
  const v=S.fleet.find(x=>x.id===vid);if(!v)return;
  curVid=vid;
  const t=gTipo(v.type),st=gStato(v.stato),sid=gStall(vid);
  const turno=sid?turni[sid]:'';
  const pos=sid?('📍 '+fmtStall(sid)):'Non assegnata';
  document.getElementById('p-num').textContent=v.targa;
  document.getElementById('p-num').style.color=t.colore;
  document.getElementById('p-mod').textContent=v.model;
  document.getElementById('p-stall').textContent=pos;
  const tp=document.getElementById('p-tipo');tp.textContent=t.nome;tp.style.color=t.colore;tp.style.borderColor=t.colore;
  document.getElementById('p-stato-dot').style.background=st.colore;
  document.getElementById('p-stato').textContent=st.nome;
  document.getElementById('p-pos').textContent=pos;
  document.getElementById('p-anno').textContent=v.anno||'—';
  const tr=document.getElementById('p-turno-row');
  if(turno){tr.style.display='flex';document.getElementById('p-turno').textContent='Turno '+turno;}
  else tr.style.display='none';
  document.getElementById('postit-text').value=postits[vid]||'';
  document.getElementById('postit-saved').textContent='';
  document.getElementById('popup').style.display='flex';
}

function closePopup(){document.getElementById('popup').style.display='none';curVid=null;}
function savePostit(){
  if(!curVid)return;
  const t=document.getElementById('postit-text').value.trim();
  POSTIT_REF.child(curVid).set(t||null).then(()=>{
    document.getElementById('postit-saved').textContent='✅ Salvato — '+new Date().toLocaleTimeString('it',{hour:'2-digit',minute:'2-digit'});
  });
}

document.getElementById('cerca').addEventListener('input',e=>{curSearch=e.target.value;buildFleet();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup();});
</script>
</body>
</html>
